<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>รายงาน</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></head>
<body class="p-4">
<div class="max-w-4xl mx-auto">
