<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงาน | Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="max-w-6xl mx-auto px-4 py-5">
        <nav class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                    <i class="fas fa-chart-line text-white"></i></div>
                <h1 class="text-2xl font-bold text-slate-800">รายงานสรุป</h1>
            </div>
            <a href="../index.html" class="px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-2xl text-sm"><i
                    class="fas fa-arrow-left mr-1"></i> กลับ</a>
        </nav>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card p-6">
                <h3 class="font-semibold mb-4"><i class="fas fa-chart-line text-indigo-500 mr-2"></i>
                    รายรับ-รายจ่ายย้อนหลัง</h3><canvas id="trendChart" height="250"></canvas>
            </div>
            <div class="card p-6">
                <h3 class="font-semibold mb-4"><i class="fas fa-chart-pie text-emerald-500 mr-2"></i>
                    สัดส่วนหมวดหมู่รายจ่าย</h3><canvas id="pieChart" height="250"></canvas>
            </div>
        </div>
    </div>
    <script>
        new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels: ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.'], datasets: [{ label: 'รายรับ', data: [35000, 42000, 38000, 45000, 43500, 41000], borderColor: '#10b981' }, { label: 'รายจ่าย', data: [28000, 31000, 29000, 35000, 3837, 32000], borderColor: '#ef4444' }] }, options: { responsive: true } });
        new Chart(document.getElementById('pieChart'), { type: 'doughnut', data: { labels: ['อาหาร', 'เดินทาง', 'ช้อปปิ้ง', 'บันเทิง', 'สุขภาพ'], datasets: [{ data: [645, 480, 1250, 350, 480], backgroundColor: ['#3b82f6', '#f97316', '#10b981', '#ef4444', '#a855f7'] }] }, options: { responsive: true } });
    </script>
</body>

</html>
