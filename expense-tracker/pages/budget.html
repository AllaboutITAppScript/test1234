<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งงบประมาณ | Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="max-w-2xl mx-auto px-4 py-5">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center">
                    <i class="fas fa-chart-line text-white"></i></div>
                <h1 class="text-2xl font-bold text-slate-800">ตั้งงบประมาณ</h1>
            </div>
            <a href="../index.html" class="px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-2xl text-sm"><i
                    class="fas fa-arrow-left mr-1"></i> กลับ</a>
        </div>
        <div class="card p-6">
            <p class="text-slate-500 text-sm mb-4">ตั้งวงเงินรายจ่ายสูงสุดในแต่ละสกุลเงิน</p>
            <div class="space-y-4">
                <div><label class="block text-sm font-medium text-slate-700 mb-1">🇹🇭 บาท (THB)</label><input
                        type="number" id="budgetThb" class="input-modern w-full" placeholder="0.00" value="0"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">🇺🇸 USD</label><input type="number"
                        id="budgetUsd" class="input-modern w-full" placeholder="0.00" value="0"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">🇪🇺 EUR</label><input type="number"
                        id="budgetEur" class="input-modern w-full" placeholder="0.00" value="0"></div>
            </div>
            <button id="saveBudgetBtn" class="btn-primary w-full mt-6 py-3 rounded-xl text-white font-semibold"><i
                    class="fas fa-save mr-2"></i> บันทึกงบประมาณ</button>
        </div>
    </div>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script>
        const currentMonth = new Date().getMonth() + 1;
        const currentYear = new Date().getFullYear();
        async function loadBudgets() { try { const budgets = await getBudgets(currentMonth, currentYear); if (budgets) { if (budgets.THB) document.getElementById('budgetThb').value = budgets.THB; if (budgets.USD) document.getElementById('budgetUsd').value = budgets.USD; if (budgets.EUR) document.getElementById('budgetEur').value = budgets.EUR; } } catch (e) { console.error(e); } }
        async function saveBudgets() {
            const budgets = { THB: parseFloat(document.getElementById('budgetThb').value) || 0, USD: parseFloat(document.getElementById('budgetUsd').value) || 0, EUR: parseFloat(document.getElementById('budgetEur').value) || 0 };
            showLoading();
            try { await setBudgets(currentMonth, currentYear, budgets); showAlert('success', 'บันทึกงบประมาณเรียบร้อย'); } catch (e) { showAlert('error', 'บันทึกไม่สำเร็จ', e.message); }
            hideLoading();
        }
        document.getElementById('saveBudgetBtn').addEventListener('click', saveBudgets);
        loadBudgets();
    </script>
</body>

</html>
