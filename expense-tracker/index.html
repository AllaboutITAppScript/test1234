<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <base href="/expense-tracker/">
    <title>Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root { --bg-primary: #0f172a; --bg-secondary: #1e293b; --card-bg: #1e293b; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border-color: #334155; }
        body { background: var(--bg-primary); min-height: 100vh; padding-bottom: 80px; transition: all 0.3s; }
        .glass-card { background: var(--card-bg); border-radius: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
        .balance-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 32px; border: 1px solid #334155; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); backdrop-filter: blur(20px); border-top: 1px solid var(--border-color); border-radius: 28px 28px 0 0; padding: 8px 20px 20px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.2s; cursor: pointer; padding: 8px 0; border-radius: 20px; color: var(--text-secondary); }
        .nav-item.active { color: #818cf8; background: rgba(129,140,248,0.1); }
        .nav-item i { font-size: 22px; }
        .nav-item span { font-size: 11px; font-weight: 500; }
        .input-modern { background: #334155; border: 1px solid #475569; border-radius: 20px; padding: 12px 16px; width: 100%; font-size: 15px; color: var(--text-primary); transition: all 0.2s; }
        .input-modern:focus { outline: none; border-color: #818cf8; box-shadow: 0 0 0 3px rgba(129,140,248,0.2); }
        .input-modern::placeholder { color: #64748b; }
        select.input-modern { background-color: #334155; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #818cf8, #6366f1); color: white; border: none; border-radius: 28px; padding: 14px 20px; font-weight: 600; font-size: 16px; transition: all 0.2s; cursor: pointer; width: 100%; }
        .btn-primary:active { transform: scale(0.97); }
        .category-badge { display: inline-block; padding: 6px 14px; background: #334155; border-radius: 40px; font-size: 12px; font-weight: 500; color: #cbd5e1; }
        .transaction-item { background: #1e293b; border-radius: 20px; padding: 14px 16px; margin-bottom: 8px; transition: all 0.2s; border: 1px solid #334155; }
        .transaction-item:active { transform: scale(0.98); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(129,140,248,0.3); border-top-color: #818cf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .amount-income { color: #34d399; font-weight: 700; }
        .amount-expense { color: #f87171; font-weight: 700; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        h1, h2, h3, p, span, label, .text-slate-700, .text-slate-800, .font-semibold, .font-bold { color: var(--text-primary); }
        .text-slate-400, .text-slate-500, .text-slate-600 { color: var(--text-secondary); }
        .bg-white { background: var(--card-bg); }
        .bg-slate-50, .bg-gray-50 { background: #1e293b; }
        .border, .border-b, .border-t { border-color: var(--border-color); }
        button.bg-indigo-500 { background: #6366f1; }
        button.bg-slate-600 { background: #475569; }
        button.bg-emerald-500 { background: #10b981; }
        button.bg-amber-500 { background: #f59e0b; }
    </style>
</head>
<body>

<div class="px-4 py-4 pb-24 max-w-md mx-auto">
    
    <!-- หน้า Dashboard -->
    <div id="page-home" class="page active">
        <div class="flex justify-between items-center mb-5">
            <div><p class="text-slate-400 text-sm">สวัสดี,</p><p class="text-white font-semibold text-lg" id="userName">ผู้ใช้</p></div>
            <button id="darkModeToggle" class="bg-slate-800 rounded-full p-2"><i class="fas fa-moon text-yellow-400 text-xl"></i></button>
        </div>

        <div class="balance-card p-5 mb-5">
            <p class="text-slate-400 text-sm mb-1">ยอดคงเหลือสุทธิ</p>
            <p class="text-4xl font-bold text-white" id="netBalance">฿0</p>
            <div class="flex justify-between mt-4 pt-3 border-t border-slate-700">
                <div><p class="text-slate-400 text-xs"><i class="fas fa-arrow-up text-emerald-500 mr-1"></i> รายรับ</p><p class="font-semibold text-emerald-400" id="totalIncome">฿0</p></div>
                <div><p class="text-slate-400 text-xs"><i class="fas fa-arrow-down text-rose-500 mr-1"></i> รายจ่าย</p><p class="font-semibold text-rose-400" id="totalExpense">฿0</p></div>
            </div>
        </div>

        <button id="fabAddBtn" class="bg-gradient-to-r from-indigo-600 to-indigo-500 rounded-2xl p-4 w-full mb-5 shadow-lg flex items-center justify-center gap-2 text-white font-semibold">
            <i class="fas fa-plus-circle text-white text-xl"></i> เพิ่มรายการใหม่
        </button>

        <div class="glass-card p-4 mb-5">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-semibold text-white"><i class="fas fa-chart-pie text-indigo-400 mr-2"></i> ค่าใช้จ่ายรายหมวด</h3>
                <select id="chartCurrency" class="text-xs bg-slate-700 border-slate-600 rounded-xl px-2 py-1 text-white">
                    <option value="">ทั้งหมด</option><option value="THB">บาท</option><option value="USD">USD</option><option value="EUR">EUR</option>
                </select>
            </div>
            <canvas id="categoryChart" height="180"></canvas>
        </div>

        <div class="glass-card p-4">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-semibold text-white"><i class="fas fa-clock text-indigo-400 mr-2"></i> รายการล่าสุด</h3>
                <button id="viewAllBtn" class="text-indigo-400 text-xs">ดูทั้งหมด <i class="fas fa-arrow-right ml-1"></i></button>
            </div>
            <div id="recentTransactions"></div>
        </div>
    </div>

    <!-- หน้ารายการทั้งหมด -->
    <div id="page-transactions" class="page">
        <div class="glass-card p-4 mb-4">
            <div class="flex gap-3">
                <select id="monthSelect" class="input-modern text-sm flex-1"></select>
                <select id="yearSelect" class="input-modern text-sm w-24"></select>
                <button id="filterBtn" class="bg-indigo-600 text-white px-4 rounded-xl text-sm"><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div id="allTransactionsList" class="space-y-2"></div>
    </div>

    <!-- หน้าเพิ่มรายการ -->
    <div id="page-add" class="page">
        <div class="glass-card p-5">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-plus-circle text-indigo-400 mr-2"></i> เพิ่มรายการใหม่</h2>
            <div class="space-y-3">
                <input type="date" id="expenseDate" class="input-modern">
                <div class="flex gap-3">
                    <button id="typeExpenseBtn" class="flex-1 py-3 rounded-xl bg-rose-950 text-rose-400 font-semibold border border-rose-800"><i class="fas fa-arrow-down mr-2"></i> รายจ่าย</button>
                    <button id="typeIncomeBtn" class="flex-1 py-3 rounded-xl bg-emerald-950 text-emerald-400 font-semibold border border-emerald-800"><i class="fas fa-arrow-up mr-2"></i> รายรับ</button>
                </div>
                <input type="number" id="amount" placeholder="จำนวนเงิน" class="input-modern">
                <select id="category" class="input-modern">
                    <option value="อาหาร">🍔 อาหาร</option>
                    <option value="เดินทาง">🚗 เดินทาง</option>
                    <option value="ช้อปปิ้ง">🛍️ ช้อปปิ้ง</option>
                    <option value="บันเทิง">🎬 บันเทิง</option>
                    <option value="สุขภาพ">💊 สุขภาพ</option>
                    <option value="เงินเดือน">💼 เงินเดือน</option>
                    <option value="อื่นๆ">📌 อื่นๆ</option>
                </select>
                <select id="currency" class="input-modern">
                    <option value="THB">🇹🇭 บาท (THB)</option>
                    <option value="USD">🇺🇸 ดอลลาร์ (USD)</option>
                    <option value="EUR">🇪🇺 ยูโร (EUR)</option>
                </select>
                <input type="text" id="description" placeholder="รายละเอียด (ไม่บังคับ)" class="input-modern">
                <button id="saveTransactionBtn" class="btn-primary mt-2"><i class="fas fa-save mr-2"></i> บันทึก</button>
            </div>
        </div>
    </div>

    <!-- หน้ารายงาน -->
    <div id="page-reports" class="page">
        <div class="glass-card p-4 mb-4">
            <select id="reportMonth" class="input-modern text-sm w-full"></select>
        </div>
        <div class="glass-card p-4 mb-4">
            <h3 class="font-semibold text-white mb-3"><i class="fas fa-chart-line text-indigo-400 mr-2"></i> รายรับ-รายจ่ายรายเดือน</h3>
            <canvas id="trendChart" height="200"></canvas>
        </div>
        <div class="glass-card p-4">
            <h3 class="font-semibold text-white mb-3"><i class="fas fa-trophy text-yellow-500 mr-2"></i> หมวดหมู่ยอดนิยม</h3>
            <div id="topCategories" class="space-y-2"></div>
        </div>
    </div>

    <!-- หน้างบประมาณ -->
    <div id="page-budget" class="page">
        <div class="glass-card p-5">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-chart-line text-amber-400 mr-2"></i> ตั้งงบประมาณรายเดือน</h2>
            <div class="space-y-4">
                <div><label class="text-sm text-slate-300"><i class="fas fa-baht-sign text-emerald-400 mr-1"></i> บาท (THB)</label><input type="number" id="budgetThb" class="input-modern mt-1" placeholder="จำนวนงบ"></div>
                <div><label class="text-sm text-slate-300"><i class="fas fa-dollar-sign text-blue-400 mr-1"></i> ดอลลาร์ (USD)</label><input type="number" id="budgetUsd" class="input-modern mt-1" placeholder="จำนวนงบ"></div>
                <div><label class="text-sm text-slate-300"><i class="fas fa-euro-sign text-purple-400 mr-1"></i> ยูโร (EUR)</label><input type="number" id="budgetEur" class="input-modern mt-1" placeholder="จำนวนงบ"></div>
                <button id="saveBudgetBtn" class="btn-primary mt-2"><i class="fas fa-save mr-2"></i> บันทึกงบประมาณ</button>
            </div>
            <div id="budgetAlert" class="mt-4 p-3 bg-amber-950 rounded-xl text-amber-300 text-sm hidden"></div>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <div class="flex justify-around">
        <div class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>หน้าแรก</span></div>
        <div class="nav-item" data-page="transactions"><i class="fas fa-list-ul"></i><span>รายการ</span></div>
        <div class="nav-item" data-page="reports"><i class="fas fa-chart-line"></i><span>รายงาน</span></div>
        <div class="nav-item" data-page="budget"><i class="fas fa-chart-pie"></i><span>งบประมาณ</span></div>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay"><div class="spinner"></div></div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
</body>
</html>
