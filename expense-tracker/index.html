<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Expense Tracker | หน้าแรก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="antialiased">

    <div class="max-w-6xl mx-auto px-4 py-5 md:py-8">
        <!-- Navigation Bar -->
        <nav class="flex flex-wrap justify-between items-center gap-3 mb-6">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                    <i class="fas fa-chart-line text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">Expense Tracker</h1>
                    <p class="text-slate-400 text-sm" id="userDisplay">กำลังเชื่อมต่อ Line...</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-2">
                <a href="index.html" class="px-4 py-2 bg-indigo-500 text-white rounded-2xl text-sm font-medium"><i
                        class="fas fa-home mr-1"></i> หน้าแรก</a>
                <a href="pages/reports.html"
                    class="px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-2xl text-sm"><i
                        class="fas fa-chart-pie mr-1"></i> รายงาน</a>
                <a href="pages/budget.html"
                    class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-2xl text-sm"><i
                        class="fas fa-chart-line mr-1"></i> งบประมาณ</a>
                <a href="pages/recurring.html"
                    class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl text-sm"><i
                        class="fas fa-sync-alt mr-1"></i> รายประจำ</a>
            </div>
        </nav>

        <!-- Main Balance Card -->
        <div class="card card-header p-6 mb-6">
            <div class="flex flex-wrap justify-between items-start">
                <div>
                    <p class="text-white/60 text-sm">ยอดคงเหลือสุทธิ</p>
                    <p class="text-3xl md:text-4xl font-bold text-white mt-1" id="netBalance">฿0</p>
                    <p class="text-white/40 text-xs mt-1" id="balanceDate">กำลังโหลด...</p>
                </div>
                <div class="text-right">
                    <p class="text-emerald-400 text-sm"><i class="fas fa-arrow-up mr-1"></i> รายรับ</p>
                    <p class="text-white font-semibold text-lg" id="totalIncome">฿0</p>
                    <p class="text-rose-400 text-sm mt-2"><i class="fas fa-arrow-down mr-1"></i> รายจ่าย</p>
                    <p class="text-white font-semibold text-lg" id="totalExpense">฿0</p>
                </div>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="card p-4 mb-6">
            <div class="flex flex-wrap gap-3 items-end">
                <div><label class="text-xs font-semibold text-slate-500 uppercase">เดือน</label>
                    <select id="monthSelect" class="input-modern text-sm"></select>
                </div>
                <div><label class="text-xs font-semibold text-slate-500 uppercase">ปี</label>
                    <select id="yearSelect" class="input-modern text-sm"></select>
                </div>
                <div><label class="text-xs font-semibold text-slate-500 uppercase">สกุลเงิน</label>
                    <select id="currencyFilter" class="input-modern text-sm">
                        <option value="">ทั้งหมด</option>
                        <option value="THB">บาท (THB)</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>
                <button id="refreshBtn" class="btn-primary px-5 py-2 rounded-xl text-white text-sm"><i
                        class="fas fa-sync-alt mr-1"></i> โหลด</button>
                <button id="exportBtn"
                    class="px-5 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-xl text-sm"><i
                        class="fas fa-file-csv mr-1"></i> CSV</button>
                <button id="setupDbBtn"
                    class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm"><i
                        class="fas fa-database mr-1"></i> Setup DB</button>
            </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="card p-5 mb-6">
            <h2 class="font-semibold text-slate-700 mb-4"><i class="fas fa-plus-circle text-emerald-500 mr-2"></i>
                เพิ่มรายการใหม่</h2>
            <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                <input type="date" id="expenseDate" class="col-span-2 md:col-span-1 input-modern text-sm">
                <select id="transactionType" class="input-modern text-sm">
                    <option value="expense">💰 รายจ่าย</option>
                    <option value="income">💵 รายรับ</option>
                </select>
                <input type="number" id="amount" step="0.01" placeholder="จำนวนเงิน" class="input-modern text-sm">
                <select id="category" class="input-modern text-sm">
                    <option value="อาหาร">🍔 อาหาร</option>
                    <option value="เดินทาง">🚗 เดินทาง</option>
                    <option value="ช้อปปิ้ง">🛍️ ช้อปปิ้ง</option>
                    <option value="บันเทิง">🎬 บันเทิง</option>
                    <option value="สุขภาพ">💊 สุขภาพ</option>
                    <option value="เงินเดือน">💼 เงินเดือน</option>
                    <option value="อื่นๆ">📌 อื่นๆ</option>
                </select>
                <select id="currency" class="input-modern text-sm">
                    <option value="THB">฿ บาท</option>
                    <option value="USD">$ USD</option>
                    <option value="EUR">€ EUR</option>
                </select>
                <input type="text" id="description" placeholder="รายละเอียด"
                    class="col-span-2 md:col-span-1 input-modern text-sm">
            </div>
            <div class="mt-4 flex justify-end">
                <button id="addExpenseBtn" class="btn-primary px-6 py-2 rounded-xl text-white font-medium"><i
                        class="fas fa-save mr-2"></i> บันทึก</button>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="card p-5 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-slate-700"><i class="fas fa-chart-pie text-indigo-500 mr-2"></i>
                    แบ่งตามหมวดหมู่</h3>
                <span class="text-xs text-slate-400" id="chartPeriod">เดือนนี้</span>
            </div>
            <canvas id="categoryChart" height="200" style="max-height: 260px;"></canvas>
            <div id="categoryLegend" class="grid grid-cols-2 gap-2 mt-4 text-sm"></div>
        </div>

        <!-- Recent Transactions -->
        <div class="card overflow-hidden">
            <div class="px-5 py-4 bg-slate-50 border-b border-slate-100">
                <h3 class="font-semibold text-slate-700"><i class="fas fa-list-ul mr-2"></i> รายการล่าสุด</h3>
            </div>
            <div class="table-wrapper">
                <table class="min-w-full transaction-table">
                    <thead>
                        <tr>
                            <th>วันที่</th>
                            <th>หมวดหมู่</th>
                            <th>รายละเอียด</th>
                            <th class="text-right">จำนวน</th>
                            <th class="text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsList">
                        <tr>
                            <td colspan="5" class="text-center py-8 text-slate-400">ไม่มีรายการ</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="bg-white rounded-2xl p-6 flex flex-col items-center shadow-2xl">
            <div class="spinner"></div>
            <div class="mt-3 text-slate-600">กำลังบันทึก...</div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
