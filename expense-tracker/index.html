<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; margin: 0; padding: 20px; padding-bottom: 80px; }
        .glass-card { background: #1e293b; border-radius: 28px; padding: 16px; margin-bottom: 16px; border: 1px solid #334155; }
        .btn-primary { background: linear-gradient(135deg, #818cf8, #6366f1); color: white; border: none; border-radius: 28px; padding: 12px; font-weight: 600; cursor: pointer; width: 100%; }
        .transaction-item { background: #1e293b; border-radius: 20px; padding: 12px; margin-bottom: 8px; border: 1px solid #334155; }
        .amount-income { color: #34d399; }
        .amount-expense { color: #f87171; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #818cf8; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .page { display: none; }
        .page.active { display: block; }
        input, select { background: #334155; border: 1px solid #475569; border-radius: 20px; padding: 10px 16px; color: white; width: 100%; }
        label, .text-white { color: white; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; display: flex; justify-content: space-around; padding: 10px 0 20px; border-top: 1px solid #334155; }
        .nav-item { text-align: center; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: #818cf8; }
    </style>
</head>
<body>
<div class="max-w-md mx-auto">
    <div id="page-home" class="page active">
        <div class="flex justify-between mb-4"><div><span class="text-white">สวัสดี, </span><span class="text-indigo-400" id="userName">ผู้ใช้</span></div><button id="darkModeToggle">🌙</button></div>
        <div class="glass-card" style="background: linear-gradient(135deg, #1e293b, #0f172a); margin-bottom: 20px;">
            <div class="text-white/70">ยอดคงเหลือสุทธิ</div>
            <div class="text-3xl font-bold text-white" id="netBalance">0</div>
            <div class="flex justify-between mt-3"><span class="text-emerald-400">รายรับ <span id="totalIncome">0</span></span><span class="text-rose-400">รายจ่าย <span id="totalExpense">0</span></span></div>
        </div>
        <button id="fabAddBtn" class="btn-primary mb-4">➕ เพิ่มรายการ</button>
        <div class="glass-card"><canvas id="categoryChart" height="180"></canvas></div>
        <div class="glass-card mt-4"><div class="flex justify-between"><span>📋 รายการล่าสุด</span><button id="viewAllBtn" class="text-indigo-400">ดูทั้งหมด</button></div><div id="recentTransactions"></div></div>
    </div>

    <div id="page-transactions" class="page">
        <div class="glass-card"><div class="flex gap-2"><select id="monthSelect"></select><select id="yearSelect"></select><button id="filterBtn" class="btn-primary" style="width: auto; padding: 10px 20px;">🔍</button></div></div>
        <div id="allTransactionsList"></div>
    </div>

    <div id="page-add" class="page">
        <div class="glass-card"><h2 class="text-white">➕ เพิ่มรายการ</h2>
        <input type="date" id="expenseDate" class="mt-2"><div class="flex gap-2 mt-2"><button id="typeExpenseBtn" class="btn-primary" style="background:#7f1d1d">รายจ่าย</button><button id="typeIncomeBtn" class="btn-primary" style="background:#064e3b">รายรับ</button></div>
        <input type="number" id="amount" placeholder="จำนวน" class="mt-2"><select id="category" class="mt-2"><option>อาหาร</option><option>เดินทาง</option><option>ช้อปปิ้ง</option><option>อื่นๆ</option></select>
        <select id="currency" class="mt-2"><option value="THB">บาท</option><option value="USD">USD</option><option value="EUR">EUR</option></select>
        <input type="text" id="description" placeholder="รายละเอียด" class="mt-2"><button id="saveTransactionBtn" class="btn-primary mt-4">บันทึก</button></div>
    </div>

    <div id="page-reports" class="page"><div class="glass-card"><canvas id="trendChart" height="200"></canvas></div><div class="glass-card"><div id="topCategories"></div></div></div>
    <div id="page-budget" class="page"><div class="glass-card"><h2 class="text-white">ตั้งงบประมาณ</h2><input type="number" id="budgetThb" placeholder="THB" class="mt-2"><input type="number" id="budgetUsd" placeholder="USD" class="mt-2"><input type="number" id="budgetEur" placeholder="EUR" class="mt-2"><button id="saveBudgetBtn" class="btn-primary mt-4">บันทึก</button><div id="budgetAlert" class="mt-2 text-amber-400"></div></div></div>
</div>

<div class="nav-bar">
    <div class="nav-item active" data-page="home"><i class="fas fa-home"></i><div>หน้าแรก</div></div>
    <div class="nav-item" data-page="transactions"><i class="fas fa-list"></i><div>รายการ</div></div>
    <div class="nav-item" data-page="reports"><i class="fas fa-chart-line"></i><div>รายงาน</div></div>
    <div class="nav-item" data-page="budget"><i class="fas fa-chart-pie"></i><div>งบประมาณ</div></div>
</div>
<div id="loadingOverlay" class="loading-overlay"><div class="spinner"></div></div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
</body>
</html>
